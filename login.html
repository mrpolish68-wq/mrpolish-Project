<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>כניסת מנהל | מיסטר פוליש</title>
  <meta name="robots" content="noindex, nofollow" />
  <meta name="theme-color" content="#111111" />

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="מיסטר פוליש" />
  <link rel="apple-touch-icon" href="icon-192.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800;900&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet" />

  <script>document.documentElement.classList.add("js");</script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" type="image/webp" href="favicon.webp" />

  <style>
    .login-wrap {
      min-height: 100vh; min-height: 100dvh;
      display: grid; place-items: center;
      padding: 24px;
      background: radial-gradient(circle at 50% 0%, oklch(0.28 0.02 264), var(--char-950) 70%);
    }
    .login-card {
      width: 100%; max-width: 400px;
      background: oklch(1 0 0 / 0.04);
      border: 1px solid oklch(0.82 0.13 88 / 0.22);
      border-radius: var(--radius-lg);
      padding: 38px 32px;
      box-shadow: var(--shadow-lg);
      -webkit-backdrop-filter: blur(12px); backdrop-filter: blur(12px);
      text-align: center;
      animation: loginIn .6s var(--ease-out) both;
    }
    @keyframes loginIn { from { opacity:0; transform: translateY(20px) scale(.98); } to { opacity:1; transform:none; } }
    .login-logo { width: 130px; height: auto; margin: 0 auto 18px; border-radius: 12px; box-shadow: 0 0 28px var(--gold-glow); }
    .login-card h1 { color: var(--white); font-size: 1.5rem; }
    .login-card .sub { color: oklch(0.8 0.01 264); font-size: .92rem; margin-block: 6px 26px; }
    .login-field { text-align: right; margin-block-end: 16px; }
    .login-field label { display:block; color: var(--gold-400); font-weight:600; font-size:.9rem; margin-block-end:6px; }
    .login-field input {
      width: 100%; font-family: var(--font-base); font-size: 1rem;
      padding: 13px 14px; border-radius: var(--radius);
      background: oklch(1 0 0 / 0.06); color: var(--white);
      border: 1.5px solid oklch(1 0 0 / 0.16);
      transition: border-color .2s, box-shadow .2s;
    }
    .login-field input::placeholder { color: oklch(0.7 0.01 264); }
    .login-field input:focus { outline:0; border-color: var(--gold-500); box-shadow: 0 0 0 3px oklch(0.82 0.13 88 / 0.25); }
    .login-error { color: oklch(0.72 0.17 25); font-weight:600; font-size:.9rem; min-height:1.2em; margin-block-start:14px; }
    .login-card.shake { animation: shake .4s; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-8px)} 40%,80%{transform:translateX(8px)} }
    .login-back { display:block; margin-block-start:20px; color: oklch(0.75 0.01 264); font-size:.85rem; padding-block:8px; }
    .login-back:hover { color: var(--gold-400); }
    /* Comfortable touch targets + tighter layout on small phones */
    .login-field input { min-height: 48px; }
    .login-card .btn { min-height: 50px; }
    @media (max-width: 400px) {
      .login-wrap { padding: 16px; }
      .login-card { padding: 30px 20px; }
      .login-logo { width: 108px; }
      .login-card h1 { font-size: 1.35rem; }
    }
  </style>
</head>

<body>
  <main class="login-wrap">
    <form class="login-card" id="loginForm" autocomplete="off">
      <img src="logo.webp" alt="מיסטר פוליש" class="login-logo" />
      <h1>כניסת מנהל</h1>
      <p class="sub">אזור מאובטח - מיסטר פוליש</p>

      <div class="login-field">
        <label for="username">שם משתמש</label>
        <input type="text" id="username" name="username" placeholder="uri / miri / yoav" autocomplete="username" autocapitalize="none" dir="ltr" required />
      </div>

      <div class="login-field">
        <label for="pw">סיסמה</label>
        <input type="password" id="pw" name="pw" placeholder="הקלד סיסמה" autocomplete="current-password" required />
      </div>

      <button type="submit" class="btn btn-shiny btn-lg btn-block">
        <span class="shiny-content">כניסה למערכת</span>
      </button>

      <p class="login-error" id="err" role="alert" aria-live="polite"></p>
      <a href="index.html" class="login-back">← חזרה לאתר</a>
    </form>
  </main>

  <script>
    (function () {
      "use strict";

      // Supabase Auth — real server-side authentication (replaces the old
      // hardcoded client-side password). The anon key is public by design.
      var SUPABASE_URL = "https://mmognkxkglkotzkuxzly.supabase.co";
      var SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1tb2dua3hrZ2xrb3R6a3V4emx5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxNDMwOTIsImV4cCI6MjA5NzcxOTA5Mn0.dZlQnKYZWv2rod-22fYh8Ou20-F6Ic1VVqZhi1anyMA";
      var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      // Only these three usernames may sign in; each maps to a Supabase Auth
      // account. Passwords are stored in Supabase — never in this source.
      var USER_MAP = {
        uri:  "uri@mrpolish.co.il",
        miri: "miri@mrpolish.co.il",
        yoav: "yoav@mrpolish.co.il"
      };

      var form = document.getElementById("loginForm");
      var username = document.getElementById("username");
      var pw = document.getElementById("pw");
      var err = document.getElementById("err");
      var card = form;

      // Already signed in (validated server-side) → straight to the dashboard.
      // getUser() verifies the JWT with Supabase, so a tampered/expired token
      // can't trigger a redirect loop with the admin guard.
      sb.auth.getUser().then(function (res) {
        if (!res.error && res.data && res.data.user) location.replace("admin.html");
      });

      function fail(msg) {
        err.style.color = "";
        err.textContent = msg;
        card.classList.remove("shake");
        void card.offsetWidth; // restart animation
        card.classList.add("shake");
      }

      form.addEventListener("submit", function (e) {
        e.preventDefault();
        var uname = (username.value || "").trim().toLowerCase();
        var emailAddr = USER_MAP[uname];
        if (!emailAddr) { fail("שם משתמש לא קיים."); username.select(); return; }
        err.style.color = "var(--whatsapp-dark)";
        err.textContent = "מתחבר…";
        sb.auth.signInWithPassword({ email: emailAddr, password: pw.value })
          .then(function (res) {
            if (res.error) { fail("פרטי התחברות שגויים, נסו שוב."); pw.select(); return; }
            location.href = "admin.html";
          })
          .catch(function () { fail("שגיאת התחברות, נסו שוב מאוחר יותר."); });
      });
    })();
  </script>
</body>
</html>
