<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<title>Mr. Polish — IG Story (Marble Scratch)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800;900&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet" />
<style>
  /* === Mr. Polish brand tokens (from styles.css) === */
  :root{
    --char-950: oklch(0.17 0.006 264);
    --char-900: oklch(0.21 0.007 264);
    --char-800: oklch(0.29 0.009 264);
    --gold-700: oklch(0.66 0.12 84);
    --gold-500: oklch(0.82 0.13 88);
    --gold-400: oklch(0.88 0.10 90);
    --gold-glow: oklch(0.78 0.14 88 / 0.45);
    --navy-700: oklch(0.38 0.10 262);
    --marble-50: oklch(0.985 0.003 264);
    --white: oklch(0.99 0 0);
    --font-base:"Heebo",system-ui,sans-serif;
    --font-display:"Playfair Display","Heebo",serif;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:#000}
  /* Instagram Story canvas */
  .stage{
    position:relative;width:1080px;height:1920px;overflow:hidden;
    font-family:var(--font-base);color:var(--white);
    background:
      radial-gradient(120% 80% at 50% 0%, oklch(0.29 0.009 264) 0%, var(--char-950) 60%),
      var(--char-950);
  }
  /* subtle marble veining */
  .veins{position:absolute;inset:0;opacity:.10;mix-blend-mode:screen;
    background:
      repeating-linear-gradient(115deg, transparent 0 60px, oklch(1 0 0 /.5) 60px 62px),
      repeating-linear-gradient(60deg, transparent 0 90px, oklch(0.82 0.13 88 /.4) 90px 91px);
    filter:blur(1px)}
  .glow{position:absolute;left:50%;top:34%;transform:translate(-50%,-50%);
    width:900px;height:900px;border-radius:50%;
    background:radial-gradient(circle, var(--gold-glow) 0%, transparent 62%);filter:blur(20px)}
  .wrap{position:relative;display:flex;flex-direction:column;height:100%;
    padding:150px 96px 130px;text-align:center}
  .kicker{font-weight:800;letter-spacing:.12em;font-size:34px;color:var(--gold-500);
    text-transform:uppercase;margin-bottom:40px}
  .head{font-family:var(--font-display);font-weight:800;font-size:148px;line-height:1.02;
    margin-bottom:30px;text-shadow:0 6px 40px oklch(0.17 0.006 264 /.6)}
  .head .gold{color:var(--gold-500)}
  .warn{font-size:120px;margin:10px 0 56px}
  .sub{font-size:50px;font-weight:400;line-height:1.5;color:oklch(0.99 0 0 /.92);
    max-width:780px;margin:0 auto}
  .sub b{font-weight:800;color:var(--gold-400)}
  .spacer{flex:1}
  /* CTA pill mimicking site .btn-gold */
  .cta{display:inline-flex;align-items:center;gap:20px;align-self:center;
    background:linear-gradient(135deg,var(--gold-500),var(--gold-700));
    color:var(--char-950);font-weight:900;font-size:48px;
    padding:38px 70px;border-radius:80px;box-shadow:0 20px 60px var(--gold-glow);
    margin-bottom:30px}
  .cta .arrow{font-size:54px}
  .swipe{font-size:34px;color:oklch(0.99 0 0 /.7);font-weight:500;letter-spacing:.04em}
  /* brand lockup */
  .brand{position:absolute;left:50%;bottom:54px;transform:translateX(-50%);
    display:flex;align-items:center;gap:22px}
  .brand img{width:84px;height:84px;border-radius:18px;object-fit:cover;
    box-shadow:0 6px 22px oklch(0 0 0 /.5)}
  .brand .name{font-family:var(--font-display);font-weight:700;font-size:46px;letter-spacing:.02em}
  .brand .name .dot{color:var(--gold-500)}
</style>
</head>
<body>
  <div class="stage">
    <div class="veins"></div>
    <div class="glow"></div>
    <div class="wrap">
      <div class="kicker">Mr. Polish · טיפ מקצועי</div>
      <h1 class="head">שריטה<br/><span class="gold">בשיש?</span></h1>
      <div class="warn">⚠️</div>
      <p class="sub">טעות אחת קטנה — ונגרם <b>נזק יקר</b>.<br/>במאמר החדש שלנו מגלים איך מתקנים שריטות בשיש <b>בלי לגרום נזק</b>.</p>
      <div class="spacer"></div>
      <div class="cta"><span class="arrow">👆</span> למדריך המלא באתר</div>
      <div class="swipe">החליקו למעלה / הקליקו על הלינק</div>
    </div>
    <div class="brand">
      <img src="../../logo.jpg" alt="Mr. Polish" onerror="this.style.display='none'"/>
      <span class="name">Mr. Polish<span class="dot">.</span></span>
    </div>
  </div>
</body>
</html>
